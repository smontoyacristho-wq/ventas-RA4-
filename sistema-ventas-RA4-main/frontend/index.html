<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador de Productos</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <!-- ===== MENU SUPERIOR ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

      <a class="navbar-brand" href="index.html">
        Sistema de Ventas
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menuPrincipal">

        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

          <li class="nav-item">
            <a class="nav-link active" href="index.html">
              Productos
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="clientes.html">
              Clientes
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="ventas.html">
              Ventas
            </a>
          </li>
        </ul>
        <button class="btn btn-success" id="btnNuevo">
          + Nuevo Producto
        </button>

      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <!-- ===== BUSCADOR ===== -->
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Buscar productos</h5>
        <div class="row g-2">
          <div class="col-md-8">
            <label class="form-label">Nombre</label>
            <input type="text" id="inputBusqueda" class="form-control" placeholder="Ej: aceite">
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <button class="btn btn-primary w-100" id="btnBuscar">Buscar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== TABLA DE PRODUCTOS ===== -->
    <h5 id="tablaProductos">Listado de productos</h5>
    <table class="table table-striped table-bordered align-middle">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Código de barras</th>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Precio venta</th>
          <th>Stock</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla">
        <!-- Las filas se cargan dinámicamente con JS -->
      </tbody>
    </table>

    <!-- ===== PAGINACIÓN ===== -->
    <nav>
      <ul class="pagination justify-content-center">
        <li class="page-item">
          <button class="page-link" id="btnAnterior">Anterior</button>
        </li>
        <li class="page-item disabled">
          <span class="page-link" id="textoPagina">Página 1 de 1</span>
        </li>
        <li class="page-item">
          <button class="page-link" id="btnSiguiente">Siguiente</button>
        </li>
      </ul>
    </nav>

  </div>

  <!-- ===== MODAL: NUEVO / EDITAR PRODUCTO ===== -->
  <div class="modal fade" id="modalProducto" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="formProducto">
          <div class="modal-header">
            <h5 class="modal-title" id="tituloModal">Nuevo Producto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="id">

            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" name="nombre" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Código de barras</label>
              <input type="text" class="form-control" name="barcode" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Descripción</label>
              <textarea class="form-control" name="descripcion" rows="3"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Precio de venta</label>
              <input type="number" step="0.01" class="form-control" name="precioVenta" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Stock</label>
              <input type="number" class="form-control" name="stock" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Nuestro JavaScript puro -->
  <script src="js/comun.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
