<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Administrador de Clientes</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body>

  <!-- MENÚ SUPERIOR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

      <a class="navbar-brand" href="index.html">
        Sistema de Ventas
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#menuPrincipal"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menuPrincipal">

        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

          <li class="nav-item">
            <a class="nav-link" href="index.html">
              Productos
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="clientes.html">
              Clientes
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="ventas.html">
              Ventas
            </a>
          </li>

        </ul>

        <button class="btn btn-success" id="btnNuevo">
          + Nuevo Cliente
        </button>

      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <!-- BUSCADOR -->
    <div class="card mb-4">
      <div class="card-body">

        <h5 class="card-title">
          Buscar clientes
        </h5>

        <div class="row g-2">

          <div class="col-md-8">
            <label class="form-label">
              Nombre o DNI
            </label>

            <input
              type="text"
              id="inputBusqueda"
              class="form-control"
              placeholder="Ejemplo: Juan o 76543210"
            >
          </div>

          <div class="col-md-4 d-flex align-items-end">
            <button
              class="btn btn-primary w-100"
              id="btnBuscar"
            >
              Buscar
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- TABLA DE CLIENTES -->
    <h5 id="tablaClientes">
      Listado de clientes
    </h5>

    <div class="table-responsive">

      <table class="table table-striped table-bordered align-middle">

        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>DNI</th>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Correo</th>
            <th>Dirección</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody id="cuerpoTabla">
          <!-- Los clientes se cargan mediante JavaScript -->
        </tbody>

      </table>

    </div>

    <!-- PAGINACIÓN -->
    <nav>
      <ul class="pagination justify-content-center">

        <li class="page-item">
          <button class="page-link" id="btnAnterior">
            Anterior
          </button>
        </li>

        <li class="page-item disabled">
          <span class="page-link" id="textoPagina">
            Página 1 de 1
          </span>
        </li>

        <li class="page-item">
          <button class="page-link" id="btnSiguiente">
            Siguiente
          </button>
        </li>

      </ul>
    </nav>

  </div>

  <!-- MODAL PARA REGISTRAR O EDITAR CLIENTE -->
  <div class="modal fade" id="modalCliente" tabindex="-1">

    <div class="modal-dialog">

      <div class="modal-content">

        <form id="formCliente">

          <div class="modal-header">

            <h5 class="modal-title" id="tituloModal">
              Nuevo Cliente
            </h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>

          </div>

          <div class="modal-body">

            <input type="hidden" name="id">

            <div class="mb-3">
              <label class="form-label">
                Nombre completo
              </label>

              <input
                type="text"
                class="form-control"
                name="nombre"
                required
              >
            </div>

            <div class="mb-3">
              <label class="form-label">
                DNI
              </label>

              <input
                type="text"
                class="form-control"
                name="dni"
                maxlength="8"
                minlength="8"
                pattern="[0-9]{8}"
                required
              >
            </div>

            <div class="mb-3">
              <label class="form-label">
                Teléfono
              </label>

              <input
                type="text"
                class="form-control"
                name="telefono"
                maxlength="9"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">
                Correo electrónico
              </label>

              <input
                type="email"
                class="form-control"
                name="correo"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">
                Dirección
              </label>

              <input
                type="text"
                class="form-control"
                name="direccion"
              >
            </div>

          </div>

          <div class="modal-footer">

            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>

            <button
              type="submit"
              class="btn btn-primary"
            >
              Guardar
            </button>

          </div>

        </form>

      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

  <script src="js/comun.js"></script>
  <script src="js/clientes.js"></script>

</body>
</html>
